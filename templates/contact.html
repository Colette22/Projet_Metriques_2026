<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Contact</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 480px;
    }
    h1 { color: #764ba2; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 24px; font-size: 14px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; color: #444; }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 18px;
      transition: border 0.3s;
    }
    input:focus, textarea:focus {
      border-color: #764ba2;
      outline: none;
    }
    textarea { height: 120px; resize: vertical; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✉️ Contactez-moi</h1>
    <p>Laissez-moi un message, je vous répondrai rapidement.</p>
    <label>Nom</label>
    <input type="text" placeholder="Votre nom" />
    <label>Prénom</label>
    <input type="text" placeholder="Votre prénom" />
    <label>Message</label>
    <textarea placeholder="Votre message..."></textarea>
    <button>Envoyer</button>
  </div>
</body>
</html>
