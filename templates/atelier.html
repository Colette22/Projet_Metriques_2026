<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Atelier — Vent Versailles</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #ffecd2, #fcb69f, #ffd1dc);
      min-height: 100vh;
      padding: 40px 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(255,182,193,0.4);
      padding: 36px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    .emoji { font-size: 52px; animation: sway 2s ease-in-out infinite; display: inline-block; }
    @keyframes sway {
      0%   { transform: rotate(-15deg); }
      50%  { transform: rotate(15deg); }
      100% { transform: rotate(-15deg); }
    }
    h1 { color: #e07a8f; margin-top: 10px; font-size: 26px; }
    p  { color: #bbb; font-size: 14px; margin-top: 6px; margin-bottom: 24px; }
    #chart { display: inline-block; }
    #status {
      margin-top: 16px;
      color: #fcb69f;
      font-weight: 600;
      font-size: 14px;
    }
    #current {
      font-size: 18px;
      color: #e07a8f;
      font-weight: 700;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🌬️</div>
    <h1>Vitesse du vent — Versailles</h1>
    <p>Vent actuel en temps réel</p>
    <div id="chart"></div>
    <div id="current"></div>
    <div id="status">Chargement...</div>
  </div>

  <script>
    google.charts.load('current', { packages: ['gauge'] });
    google.charts.setOnLoadCallback(drawChart);

    async function drawChart() {
      const res = await fetch('/atelier-data');
      const json = await res.json();

      // On prend la vitesse actuelle (premier point)
      const current = json[0].windspeed;

      const data = google.visualization.arrayToDataTable([
        ['Label', 'Value'],
        ['km/h', current]
      ]);

      const options = {
        width: 400, height: 300,
        redFrom: 30, redTo: 50,
        yellowFrom: 15, yellowTo: 30,
        greenFrom: 0, greenTo: 15,
        minorTicks: 5,
        max: 50
      };

      const chart = new google.visualization.Gauge(document.getElementById('chart'));
      chart.draw(data, options);

      document.getElementById('current').textContent = `Vent actuel : ${current} km/h`;
      document.getElementById('status').textContent = `✅ Données chargées depuis /atelier-data`;
    }
  </script>
</body>
</html>
